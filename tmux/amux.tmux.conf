# amux.tmux.conf - keybindings for amux agent multiplexer
# Source this from your tmux.conf:
#   source-file ~/Coding/agent-mux/tmux/amux.tmux.conf

# Agent picker (list agents + actions)
bind a run-shell '~/Coding/agent-mux/bin/amux _pick'

# New agent (interactive type menu)
bind A run-shell '~/Coding/agent-mux/bin/amux _menu "$(tmux display -p "#{pane_current_path}")"'

# Cycle agents (next/prev zoomed pane)
bind -n M-] run-shell '~/Coding/agent-mux/bin/amux next'
bind -n M-[ run-shell '~/Coding/agent-mux/bin/amux prev'

# Scratch popup (ephemeral agent)
bind -n M-a run-shell '~/Coding/agent-mux/bin/amux scratch'
