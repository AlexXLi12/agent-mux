# amux.tmux.conf - keybindings for amux agent multiplexer
# Source this from your tmux.conf after adding `amux` to PATH.

# Agent picker (list agents + actions)
bind a run-shell 'amux _pick'

# New agent (interactive type menu)
bind A run-shell 'amux _menu "$(tmux display -p "#{pane_current_path}")"'

# Cycle agents (next/prev zoomed pane)
bind -n M-] run-shell 'amux next'
bind -n M-[ run-shell 'amux prev'

# Scratch popup (ephemeral agent)
bind -n M-a run-shell 'amux scratch'
