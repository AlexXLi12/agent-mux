# amux.tmux.conf - keybindings for amux agent multiplexer
# Source this from your tmux.conf after install.sh stores the amux path in @amux-bin.

# Agent picker (list agents + actions)
bind a run-shell '#{@amux-bin} _pick'

# New agent (interactive type menu)
bind A run-shell '#{@amux-bin} _menu "$(tmux display -p "#{pane_current_path}")"'

# Cycle agents (next/prev zoomed pane)
bind -n M-] run-shell '#{@amux-bin} next'
bind -n M-[ run-shell '#{@amux-bin} prev'

# Scratch popup (ephemeral agent)
bind -n M-a run-shell '#{@amux-bin} scratch'
